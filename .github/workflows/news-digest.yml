name: SI8 Weekly Intelligence Digest

on:
  schedule:
    # Every Monday at 00:00 UTC = 08:00 Taipei time (UTC+8)
    - cron: '0 0 * * 1'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI
    inputs:
      lookback_days:
        description: 'Days to look back for articles'
        required: false
        default: '7'
      dry_run:
        description: 'Dry run (score articles but do not send email)'
        required: false
        default: 'false'

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tools/news-digest/requirements.txt

      - name: Install dependencies
        run: pip install -r tools/news-digest/requirements.txt

      - name: Run digest
        working-directory: tools/news-digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_TO_EMAIL: jd@superimmersive8.com
          DIGEST_FROM_EMAIL: digest@superimmersive8.com
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python digest.py --lookback $LOOKBACK_DAYS $DRY_RUN_FLAG
